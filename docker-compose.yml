services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vaultix
      POSTGRES_USER: vaultix
      POSTGRES_PASSWORD: vaultix
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultix -d vaultix"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_SECRET_KEY: "django-insecure-dev"
      POSTGRES_DB: vaultix
      POSTGRES_USER: vaultix
      POSTGRES_PASSWORD: vaultix
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "/api"
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:

