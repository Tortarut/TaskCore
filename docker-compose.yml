services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vaultix
      POSTGRES_USER: vaultix
      POSTGRES_PASSWORD: vaultix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultix -d vaultix"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-0}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me}"
      POSTGRES_DB: vaultix
      POSTGRES_USER: vaultix
      POSTGRES_PASSWORD: vaultix
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  backend-migrate:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-0}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me}"
      POSTGRES_DB: vaultix
      POSTGRES_USER: vaultix
      POSTGRES_PASSWORD: vaultix
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "python scripts/wait_for_db.py && python manage.py migrate --noinput"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "/api"
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:

