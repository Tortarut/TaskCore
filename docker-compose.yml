services:
  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_SECRET_KEY: "django-insecure-dev"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "/api"
    ports:
      - "3000:80"
    depends_on:
      - backend

