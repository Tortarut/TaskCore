name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to deploy
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/taskcore"; fi
            REF="${{ github.event.inputs.ref }}"

            cd "$APP_DIR"
            git fetch origin
            git checkout "$REF"
            git pull origin "$REF"

            docker compose run --rm backend-migrate
            docker compose up -d --build

            echo "Waiting for API (backend may need up to ~60s for DB)..."
            ok=0
            for i in $(seq 1 45); do
              if curl -fsS http://127.0.0.1:3000/api/schema/ > /dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              echo "Health check failed after 90s"
              docker compose ps
              docker compose logs --tail=40 backend frontend
              exit 1
            fi
            echo "Deploy finished: $REF"
